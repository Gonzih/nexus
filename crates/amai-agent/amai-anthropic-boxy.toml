# AMAI Agent — Anthropic + boxy id-service + soullog
# Use when running locally against boxy's deployed services

[agent]
strategy = "failover"
max_turns = 50
cwd = "."
context_strategy = "rlm"

[providers.anthropic]
kind = "anthropic"
api_key_env = "ANTHROPIC_API_KEY"
model = "claude-sonnet-4-6"
context_window = 200000
max_output_tokens = 8192
weight = 10

[intents.reasoning]
preferred = ["anthropic"]
models = { anthropic = "claude-opus-4-6" }

[intents.code_generation]
preferred = ["anthropic"]
models = { anthropic = "claude-opus-4-6" }

[intents.quick_chat]
preferred = ["anthropic"]
models = { anthropic = "claude-haiku-4-5-20251001" }

[intents.subagent]
preferred = ["anthropic"]
models = { anthropic = "claude-haiku-4-5-20251001" }

[identity]
id_service_url = "http://100.84.38.25:8080"
name = "amai-research-agent"

[soullog]
url = "http://100.84.38.25:8086"
service = "amai-research-agent"
batch_size = 50
flush_interval_ms = 500
