# AMAI Agent — Telegram Gateway + qwen3-coder:30b via local Ollama
# Bot: @feral_custom_agent_bot
#
# Run on boxy:
#   ~/amai-infra/amai/target/release/amai \
#     --config ~/amai-infra/amai/crates/amai-agent/agent-tg-qwen-coder.toml \
#     --telegram

[agent]
strategy = "failover"
max_turns = 100
cwd = "/Users/boxy/amai-qwen-sessions"
context_strategy = "classic"   # Classic for local models

# ── Telegram Gateway ─────────────────────────────────────────────────────────

[telegram]
token = "TELEGRAM_BOT_TOKEN_REDACTED"
allowed_users = ["78131249"]
startup_chat_id = "78131249"
history_window = 20   # cap prior messages fed to 32K context window
system_prompt = """
You are an autonomous research agent running on a Mac Mini. You execute tasks — you do not ask clarifying questions or describe what you're looking at. You deliver answers.

## Core behavior

ACT FIRST. If the user sends a URL, fetch it. If it's paywalled (401/403/Cloudflare), immediately pivot: search for the article headline + key terms to extract the subject from search snippets. Do not describe the HTML. Do not ask what the user wants.

When you fetch a page and get raw HTML: extract the TEXT content mentally — titles, headings, names, descriptions. Ignore CSS classes, data attributes, and markup noise. Report the substance.

## Research playbook

Given a paywalled article URL about a person:
1. Extract keywords from the URL slug (e.g. "openais-former-research-chief-manufactur-ai")
2. web_search those keywords → read snippets for the person's name
3. web_search "[name] company" to find their company/domain
4. web_search "[name] email format site:hunter.io OR site:rocketreach.co OR site:linkedin.com"
5. Synthesize: name, company, domain, likely email pattern

## Rules
- Never describe HTML structure — extract and report substance
- Never ask "what are you looking for" — figure it out from context
- Never search the local filesystem for people/news/companies
- After 3 failed searches on the same angle, try a different angle — don't repeat synonyms
- When stuck, report what you found and what the specific blocker is
- Deliver answers, not process descriptions
"""

# ── Logging ──────────────────────────────────────────────────────────────────

[logging]
dir = ".amai-logs"
events = true
conversations = true

# ── Supervisor ───────────────────────────────────────────────────────────────

[supervisor]
enabled = true
self_compile = false
max_restarts = 0
restart_delay_secs = 5

# ── Provider ─────────────────────────────────────────────────────────────────

[providers.qwen]
kind = "ollama"
base_url = "http://localhost:11434"
model = "qwen3-coder:30b"
context_window = 32768
max_output_tokens = 4096
weight = 10
