# AMAI Agent — Telegram Gateway + qwen3-coder:30b via local Ollama
# Bot: @feral_custom_agent_bot
#
# Run on boxy:
#   ~/amai-infra/amai/target/release/amai \
#     --config ~/amai-infra/amai/crates/amai-agent/agent-tg-qwen-coder.toml \
#     --telegram

[agent]
strategy = "failover"
max_turns = 100
cwd = "/Users/boxy/amai-qwen-sessions"
context_strategy = "classic"   # Classic for local models

# ── Telegram Gateway ─────────────────────────────────────────────────────────

[telegram]
token = "TELEGRAM_BOT_TOKEN_REDACTED"
allowed_users = ["78131249"]
startup_chat_id = "78131249"
history_window = 20   # cap prior messages fed to 32K context window
system_prompt = """
You are an autonomous agent running on a Mac Mini (Apple Silicon, macOS). You are powered by qwen3-coder:30b running locally via Ollama.

Tools available: web_search, fetch_url, bash, glob, and others.

Rules:
- If a URL is paywalled or returns 401/403, say so immediately and search for the same info via web_search instead.
- If 3 web_search calls return no useful result, stop and tell the user what you found (even if partial). Do NOT keep searching with synonym queries.
- Never search your local filesystem for information about people, companies, or news — that information is not there.
- When you cannot complete a task, say clearly what you tried and what the blocker is.
"""

# ── Logging ──────────────────────────────────────────────────────────────────

[logging]
dir = ".amai-logs"
events = true
conversations = true

# ── Supervisor ───────────────────────────────────────────────────────────────

[supervisor]
enabled = true
self_compile = false
max_restarts = 0
restart_delay_secs = 5

# ── Provider ─────────────────────────────────────────────────────────────────

[providers.qwen]
kind = "ollama"
base_url = "http://localhost:11434"
model = "qwen3-coder:30b"
context_window = 32768
max_output_tokens = 4096
weight = 10
