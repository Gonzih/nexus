[agent]
strategy = "failover"
max_turns = 25
cwd = "/Users/feral/amai-infra"
context_strategy = "rlm"

[providers.gemini]
kind = "openai"
api_key_env = "GEMINI_API_KEY"
base_url = "https://generativelanguage.googleapis.com/v1beta/openai"
model = "gemini-2.5-flash"
context_window = 1048576
max_output_tokens = 65536
weight = 20
rpm = 15
rpd = 1500
tpm = 1000000

[providers.minimax]
kind = "ollama"
base_url = "http://localhost:11434"
model = "minimax-m2.5:cloud"
context_window = 128000
max_output_tokens = 4096
weight = 5

[intents.reasoning]
preferred = ["gemini"]

[intents.code_generation]
preferred = ["gemini", "minimax"]

[intents.quick_chat]
preferred = ["minimax", "gemini"]
