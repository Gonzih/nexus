# AMAI Agent — Shepherd mode + Qwen3.5:9b via local Ollama + Full A2A Infrastructure
# Local model: slower per-turn, no API cost
#
# Launch (shepherd spawns this automatically):
#   amai --config agent-shepherd-qwen.toml --shepherd ws://shepherd:8084/ws/sessions/{id}

[agent]
strategy = "failover"
max_turns = 40
cwd = "."
context_strategy = "classic"   # Classic for local models

# ── Shepherd Connection ───────────────────────────────────────────────────────

[shepherd]
heartbeat_secs = 15
api_url = "http://localhost:8094"

# ── Logging ──────────────────────────────────────────────────────────────────

[logging]
dir = ".amai-logs"
events = true
conversations = true

# ── Supervisor ───────────────────────────────────────────────────────────────

[supervisor]
enabled = false

# ── Provider ─────────────────────────────────────────────────────────────────

[providers.qwen]
kind = "ollama"
base_url = "http://localhost:11434"
model = "qwen3.5:9b"
context_window = 32768
max_output_tokens = 2048       # Cap per turn for local inference speed
weight = 10

# ── Identity (registers with id-service, enables contracts + shepherd tools) ─

[identity]
id_service_url = "http://localhost:8080"
name = "amai-qwen-agent"
key_dir = "/Users/boxy/.amai/qwen-identity"

# ── Soul Log ──────────────────────────────────────────────────────────────────

[soullog]
url = "http://localhost:8086"
service = "amai-qwen-agent"
batch_size = 50
flush_interval_ms = 500
