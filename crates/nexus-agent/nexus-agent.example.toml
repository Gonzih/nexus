# Nexus Agent Configuration
# Copy to nexus-agent.toml and set API keys as environment variables

[agent]
strategy = "failover"  # failover | round_robin | weighted | least_loaded
max_turns = 50
cwd = "."

# ── Providers ────────────────────────────────────────────────────────────────

[providers.gemini]
kind = "openai"  # Uses OpenAI-compatible API
api_key_env = "GEMINI_API_KEY"
base_url = "https://generativelanguage.googleapis.com/v1beta/openai"
model = "gemini-2.0-flash"
context_window = 1048576
max_output_tokens = 8192
weight = 40
rpm = 15
rpd = 1500
tpm = 1000000

[providers.groq]
kind = "openai"
api_key_env = "GROQ_API_KEY"
base_url = "https://api.groq.com/openai/v1"
model = "llama-3.3-70b-versatile"
context_window = 128000
max_output_tokens = 8192
weight = 30
rpm = 30

[providers.sambanova]
kind = "openai"
api_key_env = "SAMBANOVA_API_KEY"
base_url = "https://api.sambanova.ai/v1"
model = "Meta-Llama-3.1-405B-Instruct"
context_window = 128000
max_output_tokens = 8192
weight = 20

[providers.ollama]
kind = "ollama"
base_url = "http://localhost:11434"
model = "qwen2.5-coder:32b"
context_window = 32768
max_output_tokens = 8192
weight = 10

# ── Intent Routing ───────────────────────────────────────────────────────────
# Each intent maps to preferred providers + optional model overrides

[intents.reasoning]
preferred = ["gemini", "sambanova"]
models = { gemini = "gemini-1.5-pro" }

[intents.code_generation]
preferred = ["groq", "gemini"]

[intents.quick_chat]
preferred = ["groq"]
models = { groq = "llama-3.1-8b-instant" }

[intents.subagent]
preferred = ["groq", "ollama"]
models = { groq = "llama-3.1-8b-instant" }

[intents.embedding]
preferred = ["ollama"]
models = { ollama = "nomic-embed-text" }
