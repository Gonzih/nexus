# Nexus Agent — Anthropic multi-model config
# Routing: Opus 4.6 for reasoning/code, Haiku 4.5 for subagent/quick turns
# API key: set ANTHROPIC_API_KEY env var

[agent]
strategy = "failover"
max_turns = 50
cwd = "."
context_strategy = "rlm"

# Single Anthropic provider — intent routing overrides the model per intent
[providers.anthropic]
kind = "anthropic"
api_key_env = "ANTHROPIC_API_KEY"
model = "claude-sonnet-4-6"        # default: Sonnet 4.6 (balanced)
context_window = 80000
max_output_tokens = 8192
weight = 10

# ── Intent Routing ────────────────────────────────────────────────────────────
# Routing picks the best model per intent. Same Anthropic provider, different models.

[intents.reasoning]
preferred = ["anthropic"]
models = { anthropic = "claude-opus-4-6" }     # Opus for hard reasoning / planning

[intents.code_generation]
preferred = ["anthropic"]
models = { anthropic = "claude-opus-4-6" }     # Opus for code writes

[intents.quick_chat]
preferred = ["anthropic"]
models = { anthropic = "claude-haiku-4-5-20251001" }  # Haiku for fast turns

[intents.subagent]
preferred = ["anthropic"]
models = { anthropic = "claude-haiku-4-5-20251001" }  # Haiku for subagent delegation
